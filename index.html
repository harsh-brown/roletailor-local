<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RoleTailor Local</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a18;min-height:100vh;display:flex;flex-direction:column}
:root{--navy:#1a2744;--navy-light:#2a3a5c;--teal:#0d9488;--teal-light:#14b8a6;--teal-bg:#f0fdfa;--amber:#d97706;--amber-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--green:#16a34a;--green-bg:#f0fdf4;--gray:#6b7280;--gray-bg:#f9fafb;--border:#e5e7eb;--white:#ffffff;--text:#1a1a18;--text2:#4b5563}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:200px;background:var(--navy);color:#fff;display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.1)}
.logo-text{font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.logo-sub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:2px}
.nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,0.6);border-left:2px solid transparent;transition:all 0.15s}
.nav-item:hover{color:#fff;background:rgba(255,255,255,0.07)}
.nav-item.active{color:#fff;background:rgba(13,148,136,0.2);border-left-color:var(--teal-light)}
.nav-item i{font-size:16px;flex-shrink:0}
.content{flex:1;overflow-y:auto;background:#f5f5f0}
.screen{padding:28px 32px;max-width:900px}
.screen-title{font-size:20px;font-weight:600;color:var(--navy);margin-bottom:4px}
.screen-sub{font-size:13px;color:var(--gray);margin-bottom:24px}
.card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;color:var(--navy)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.15s}
.btn-primary{background:var(--teal);color:#fff}
.btn-primary:hover{background:var(--teal-light)}
.btn-secondary{background:#fff;border:1px solid var(--border);color:var(--text2)}
.btn-secondary:hover{background:var(--gray-bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid #fecaca}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid #bbf7d0}
.input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;outline:none;background:#fff;color:var(--text)}
.input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,0.1)}
.textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:7px;font-size:13px;outline:none;resize:vertical;font-family:inherit;background:#fff;color:var(--text)}
.textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(13,148,136,0.1)}
.label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:5px;display:block}
.field{margin-bottom:14px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:500}
.badge-teal{background:#ccfbf1;color:#0f766e}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-green{background:#dcfce7;color:#166534}
.badge-gray{background:#f3f4f6;color:#4b5563}
.badge-blue{background:#dbeafe;color:#1e40af}
.score-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;background:var(--teal);transition:width 0.3s}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px}
.stat-val{font-size:22px;font-weight:600;color:var(--navy)}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:2px}
.bullet-row{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:#fff;transition:border-color 0.15s}
.bullet-row:hover{border-color:var(--teal)}
.bullet-row.selected{border-color:var(--teal);background:var(--teal-bg)}
.bullet-row.dropped{opacity:0.45}
.bullet-text{font-size:13px;color:var(--text);flex:1;line-height:1.5}
.bullet-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.diff-block{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.diff-orig{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:12px}
.diff-new{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px}
.diff-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.diff-orig .diff-label{color:#dc2626}
.diff-new .diff-label{color:#16a34a}
.diff-text{font-size:13px;line-height:1.6}
.kw-cloud{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.progress-dots{display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;background:#e5e7eb}
.dot.done{background:var(--teal)}
.dot.active{background:var(--amber);width:9px;height:9px}
.exp-card{border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
.exp-header{padding:12px 16px;background:#fafafa;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.exp-title{font-size:14px;font-weight:600;color:var(--navy)}
.exp-meta{font-size:12px;color:var(--gray)}
.exp-body{padding:14px 16px;border-top:1px solid var(--border)}
.home-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:28px}
.action-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all 0.15s;text-align:center}
.action-card:hover{border-color:var(--teal);box-shadow:0 4px 12px rgba(13,148,136,0.1)}
.action-icon{font-size:28px;color:var(--teal);margin-bottom:10px}
.action-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:4px}
.action-desc{font-size:12px;color:var(--gray);line-height:1.5}
.inclusion-must{border-left:3px solid var(--teal)!important}
.inclusion-good{border-left:3px solid var(--amber)!important}
.inclusion-drop{border-left:3px solid #d1d5db!important}
.review-status{display:flex;gap:6px;padding:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:#fff;border-radius:12px;padding:24px;width:520px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.15)}
.modal-title{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:16px}
.export-preview{background:#f9fafb;border:1px solid var(--border);border-radius:8px;padding:20px;font-family:Georgia,serif;font-size:12px;line-height:1.7;min-height:300px}
.export-name{font-size:18px;font-weight:700;margin-bottom:2px;color:#0a0a08}
.export-contact{font-size:11px;color:#555;margin-bottom:12px}
.export-section{margin-bottom:14px}
.export-sh{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid #ccc;padding-bottom:3px;margin-bottom:8px}
.export-role{display:flex;justify-content:space-between;margin-bottom:2px}
.export-role-title{font-size:13px;font-weight:600}
.export-role-date{font-size:11px;color:#666}
.export-bullet{font-size:11px;color:#333;margin-left:14px;margin-bottom:2px;position:relative}
.export-bullet::before{content:"•";position:absolute;left:-10px}
.tab-row{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500}
</style>
</head>
<body>
<div class="app" id="app"></div>
<script>
const STARTER_CV = {
  profile:{fullName:"Harsh Kumar",headline:"Product-focused operator with experience across enterprise sales, product marketing, and analytics",email:"harsh.kumar991@gmail.com",phone:"8292267913",location:"New Delhi, India",linkedin:""},
  education:[{id:"edu_iimc",degree:"MBA",field:"General Management",institution:"IIM Calcutta",year:"2024",tags:["mba","strategy","management"]}],
  skills:{product:["roadmapping","prioritization","go-to-market","stakeholder management"],analytics:["GA4","Power BI","SQL","Tableau"],business:["enterprise sales","market research","ABM","B2B partnerships"]},
  experience:[
    {id:"exp_cloudangles",company:"Cloudangles",title:"Product Marketing Manager",startDate:"2024-04",endDate:null,domain:"AI SaaS",bullets:[
      {id:"b1",original:"Led end-to-end GTM strategy for AI SaaS platforms, targeting C-suite buyers, achieving 40% MQL growth.",facts:{metrics:["40% MQL growth"],tools:[],entities:["AI SaaS","C-suite buyers"]},tags:["gtm","b2b","growth","product-marketing"],competencies:["positioning","launch","market-insight"],targetRoles:["pmm","pm","growth-pm"],priority:0.9},
      {id:"b2",original:"Developed competitive positioning for 3 product lines, reducing sales cycle by 18% through targeted battle cards.",facts:{metrics:["18% sales cycle reduction"],tools:[],entities:["battle cards"]},tags:["competitive","product","positioning"],competencies:["prioritization","analytics"],targetRoles:["pm","pmm"],priority:0.8},
      {id:"b3",original:"Orchestrated 12 enterprise ABM campaigns with sales team, driving \u20b92.4Cr in qualified pipeline.",facts:{metrics:["\u20b92.4Cr pipeline"],tools:[],entities:["ABM campaigns"]},tags:["enterprise","abm","sales","gtm"],competencies:["cross-functional","GTM"],targetRoles:["pm","pmm","growth-pm"],priority:0.75}
    ]},
    {id:"exp_byjus",company:"BYJU'S",title:"Business Development Manager",startDate:"2022-06",endDate:"2024-03",domain:"EdTech",bullets:[
      {id:"b4",original:"Managed \u20b98Cr annual B2B account portfolio, achieving 120% of quota for 6 consecutive quarters.",facts:{metrics:["\u20b98Cr portfolio","120% quota","6 quarters"]},tags:["b2b","revenue","enterprise","sales"],competencies:["stakeholder management","execution"],targetRoles:["pm","growth-pm"],priority:0.7},
      {id:"b5",original:"Identified market gaps through customer discovery with 200+ enterprise stakeholders, informing 3 product pivots.",facts:{metrics:["200+ stakeholders","3 pivots"]},tags:["customer-discovery","product","insight"],competencies:["customer-insight","prioritization"],targetRoles:["pm"],priority:0.85},
      {id:"b6",original:"Built cross-functional coordination workflow across sales, product, and content teams; reduced onboarding time by 30%.",facts:{metrics:["30% onboarding reduction"]},tags:["cross-functional","process","stakeholder"],competencies:["cross-functional","execution"],targetRoles:["pm","operations"],priority:0.78}
    ]}
  ]
};

const ROLE_KEYWORDS = {pm:["roadmap","prioritization","stakeholder","product strategy","user research","agile","sprint","backlog","go-to-market","analytics","experimentation","customer discovery","cross-functional","product metrics","OKR"],pmm:["positioning","messaging","go-to-market","GTM","competitive","launch","market research","demand generation","ABM","enablement"],growth:["growth","acquisition","retention","funnel","experimentation","A/B","conversion","analytics","LTV","CAC"]};

let state = {
  screen:"home",cv:JSON.parse(JSON.stringify(STARTER_CV)),
  jd:{rawText:"",keywords:[],mustHave:[],niceToHave:[],title:"",seniority:"",domain:""},
  matching:{bullets:[],selectedIds:new Set()},
  rewrites:{},rewriteStatuses:{},
  sessionId:"sess_"+Date.now(),expandedExp:null,addBulletExp:null,modal:null,
  cvTab:"experience"
};

function extractKeywords(text){
  const lower=text.toLowerCase();
  const kwMap={"product strategy":7,"roadmap":7,"product roadmap":8,"prioritization":6,"stakeholder management":8,"user research":7,"customer discovery":8,"product metrics":7,"agile":6,"sprint":5,"backlog":6,"go-to-market":7,"gtm":7,"analytics":8,"sql":6,"experimentation":7,"a/b testing":6,"cross-functional":8,"okr":6,"data-driven":5,"b2b":6,"saas":7,"enterprise":7,"growth":6,"retention":5,"acquisition":5,"market research":6,"competitive analysis":6,"positioning":6,"launch":5,"roadmapping":5,"power bi":5,"tableau":5,"stakeholder":6};
  const found={},must=[],nice=[];
  Object.keys(kwMap).forEach(k=>{if(lower.includes(k)){found[k]=kwMap[k]}});
  const lines=text.split(/[\n.]/);
  lines.forEach(line=>{const l=line.toLowerCase();const isReq=/(required|must|essential|need|minimum)/i.test(line);const isPref=/(preferred|nice|bonus|plus|ideally)/i.test(line);Object.keys(found).forEach(k=>{if(l.includes(k)){if(isReq&&!must.includes(k))must.push(k);else if(isPref&&!nice.includes(k))nice.push(k)}})});
  const remaining=Object.keys(found).filter(k=>!must.includes(k)&&!nice.includes(k));
  must.push(...remaining.slice(0,4));nice.push(...remaining.slice(4));
  const title=(/product manager/i.test(text)?"Product Manager":/product marketing/i.test(text)?"Product Marketing Manager":/growth/i.test(text)?"Growth PM":"Product Manager");
  const seniority=(/senior|lead|principal/i.test(text)?"Senior":/associate|junior|entry/i.test(text)?"Associate":"Mid-level");
  const domain=(/saas/i.test(text)?"SaaS":/fintech/i.test(text)?"Fintech":/edtech/i.test(text)?"EdTech":"B2B SaaS");
  return{keywords:[...must,...nice].slice(0,15),mustHave:must.slice(0,6),niceToHave:nice.slice(0,5),title,seniority,domain};
}

function scoreBullet(bullet,jd){
  const text=bullet.original.toLowerCase();const tags=bullet.tags||[];const comp=bullet.competencies||[];
  let skillOverlap=0;let matched=[];
  (jd.keywords||[]).forEach(k=>{if(text.includes(k.toLowerCase())||tags.some(t=>t.includes(k.toLowerCase().split(' ')[0]))){skillOverlap++;matched.push(k)}});
  skillOverlap=Math.min(skillOverlap/Math.max((jd.keywords||[]).length,1),1);
  const roleScore=tags.filter(t=>["pm","product","roadmap","prioritization","customer-insight","cross-functional","analytics"].includes(t)).length>0?1:0.3;
  const domainScore=tags.some(t=>["b2b","saas","enterprise"].includes(t))?1:0.5;
  const metricScore=(bullet.facts?.metrics||[]).length>0?1:0.3;
  const hasActionVerb=/^(led|launched|managed|built|drove|increased|reduced|identified|developed|owned|orchestrated|executed)/i.test(bullet.original)?1:0.6;
  const recency=bullet.id.startsWith("b1")||bullet.id.startsWith("b2")||bullet.id.startsWith("b3")?1:0.7;
  const score=0.35*skillOverlap+0.20*roleScore+0.15*domainScore+0.15*metricScore+0.10*hasActionVerb+0.05*recency;
  const recommendation=score>0.65?"must-include":score>0.40?"good-option":"drop";
  return{...bullet,score:Math.min(score,1),matchedKeywords:matched,recommendation};
}

function ruleRewrite(bullet,jdTitle){
  let text=bullet.original;
  const pmVerbs={["Amplified"]:"Drove",["Orchestrated"]:"Led",["Spearheaded"]:"Led",["Championed"]:"Drove"};
  Object.keys(pmVerbs).forEach(v=>{text=text.replace(new RegExp("^"+v),pmVerbs[v])});
  const pmSwaps=[["marketing-qualified leads","MQLs"],["battle cards","product enablement materials"],["business development","growth initiatives"]];
  pmSwaps.forEach(([a,b])=>{if(!bullet.original.toLowerCase().includes("product"))text=text.replace(new RegExp(a,"gi"),b)});
  const words=text.split(" ");if(words.length>30){text=words.slice(0,28).join(" ")+".";}
  text=text.replace(/\s+/g," ").trim();
  if(!text.endsWith("."))text+=".";
  return text===bullet.original?text.replace(/\./,"— driving measurable business impact.").replace(/—\./,"."):text;
}

function render(){
  const app=document.getElementById("app");
  if(!app)return;
  app.innerHTML=`${renderSidebar()}${renderMain()}`;
  attachEvents();
}

function renderSidebar(){
  const steps=["home","master-cv","jd-analyzer","match-studio","rewrite-review","export"];
  const labels={home:"Home","master-cv":"Master CV","jd-analyzer":"JD Analyzer","match-studio":"Match Studio","rewrite-review":"Rewrite Review",export:"Export"};
  const icons={home:"ti-home","master-cv":"ti-file-cv","jd-analyzer":"ti-file-text","match-studio":"ti-adjustments","rewrite-review":"ti-check",export:"ti-download"};
  return`<div class="sidebar">
    <div class="logo"><div class="logo-text">RoleTailor</div><div class="logo-sub">Local &middot; No backend</div></div>
    <nav class="nav">
      ${steps.map((s,i)=>`
        <div class="nav-item ${state.screen===s?"active":""}" data-nav="${s}">
          <i class="ti ${icons[s]}" aria-hidden="true"></i>${labels[s]}
        </div>`).join("")}
    </nav>
    <div style="padding:12px 16px 20px;border-top:1px solid rgba(255,255,255,0.08)">
      <div style="font-size:11px;color:rgba(255,255,255,0.3)">All data stays on device</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.2);margin-top:2px">No backend &middot; No auth</div>
    </div>
  </div>`;
}

function renderMain(){
  const screens={home:renderHome,"master-cv":renderMasterCV,"jd-analyzer":renderJDAnalyzer,"match-studio":renderMatchStudio,"rewrite-review":renderRewriteReview,export:renderExport};
  const modal=state.modal?renderModal():"";
  return`<div class="content">${(screens[state.screen]||renderHome)()}${modal}</div>`;
}

function renderHome(){
  const hasJD=state.jd.rawText.length>50;const hasCV=state.cv.experience.length>0;
  const totalBullets=state.cv.experience.reduce((a,e)=>a+e.bullets.length,0);
  const selectedCount=state.matching.selectedIds?.size||0;
  const approvedCount=Object.values(state.rewriteStatuses).filter(s=>s==="approved").length;
  return`<div class="screen">
    <div class="screen-title">RoleTailor Local</div>
    <div class="screen-sub">Tailor your resume to any job description &mdash; all processing on-device, no backend required.</div>
    <div class="home-actions">
      <div class="action-card" data-nav="master-cv">
        <div class="action-icon"><i class="ti ti-file-cv"></i></div>
        <div class="action-title">Master CV</div>
        <div class="action-desc">${totalBullets} bullets across ${state.cv.experience.length} roles ready to match</div>
      </div>
      <div class="action-card" data-nav="jd-analyzer">
        <div class="action-icon"><i class="ti ti-file-text"></i></div>
        <div class="action-title">JD Analyzer</div>
        <div class="action-desc">${hasJD?"JD loaded: "+state.jd.keywords.length+" keywords extracted":"Paste a job description to begin"}</div>
      </div>
      <div class="action-card" data-nav="match-studio">
        <div class="action-icon"><i class="ti ti-adjustments"></i></div>
        <div class="action-title">Match Studio</div>
        <div class="action-desc">${selectedCount>0?selectedCount+" bullets selected":"Score and select bullets for your target role"}</div>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Session progress</div></div>
      <div class="grid3" style="margin-bottom:16px">
        <div class="stat-card"><div class="stat-val">${totalBullets}</div><div class="stat-lbl">Bullets in master CV</div></div>
        <div class="stat-card"><div class="stat-val">${state.jd.keywords.length}</div><div class="stat-lbl">JD keywords extracted</div></div>
        <div class="stat-card"><div class="stat-val">${selectedCount}</div><div class="stat-lbl">Bullets selected</div></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="progress-dots">
          ${["master-cv","jd-analyzer","match-studio","rewrite-review","export"].map(s=>`
            <div class="dot ${s==="export"&&approvedCount>0?"done":s==="rewrite-review"&&selectedCount>0?"done":s==="match-studio"&&hasJD?"done":s==="jd-analyzer"&&hasCV?"done":""}"></div>
          `).join("")}
        </div>
        <span style="font-size:12px;color:var(--gray)">Build &rarr; Analyze &rarr; Match &rarr; Review &rarr; Export</span>
      </div>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Quick import / export</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary btn-sm" id="btn-export-json"><i class="ti ti-download"></i> Save session JSON</button>
        <button class="btn btn-secondary btn-sm" id="btn-import-json"><i class="ti ti-upload"></i> Load session JSON</button>
        <input type="file" id="import-file" accept=".json" style="display:none"/>
      </div>
    </div>
  </div>`;
}

function renderMasterCV(){
  const cv=state.cv;
  const tabs=[{id:"experience",label:"Experience"},{id:"skills",label:"Skills"},{id:"education",label:"Education"},{id:"profile",label:"Profile"}];
  return`<div class="screen">
    <div class="screen-title">Master CV</div>
    <div class="screen-sub">Your structured knowledge base &mdash; edit bullets, add tags, track metrics. This drives all matching.</div>
    <div class="tab-row">
      ${tabs.map(t=>`<div class="tab ${state.cvTab===t.id?"active":""}" data-tab="${t.id}">${t.label}</div>`).join("")}
    </div>
    ${state.cvTab==="experience"?renderExperienceTab(cv):""}
    ${state.cvTab==="skills"?renderSkillsTab(cv):""}
    ${state.cvTab==="education"?renderEducationTab(cv):""}
    ${state.cvTab==="profile"?renderProfileTab(cv):""}
  </div>`;
}

function renderExperienceTab(cv){
  return`<div>
    ${cv.experience.map(exp=>`
      <div class="exp-card" id="exp-${exp.id}">
        <div class="exp-header" data-expand="${exp.id}">
          <div>
            <div class="exp-title">${exp.title} &middot; ${exp.company}</div>
            <div class="exp-meta">${exp.startDate} &rarr; ${exp.endDate||"Present"} &middot; ${exp.domain} &middot; ${exp.bullets.length} bullets</div>
          </div>
          <i class="ti ${state.expandedExp===exp.id?"ti-chevron-up":"ti-chevron-down"}" aria-hidden="true"></i>
        </div>
        ${state.expandedExp===exp.id?`<div class="exp-body">

function renderMatchStudio(){
  const allBullets=[];
  state.cv.experience.forEach(exp=>{exp.bullets.forEach(b=>{allBullets.push({...b,company:exp.company,expTitle:exp.title});})});
  const scored=state.jd.keywords.length>0?allBullets.map(b=>scoreBullet(b,state.jd)):allBullets.map(b=>({...b,score:b.priority||0.5,matchedKeywords:[],recommendation:"good-option"}));
  scored.sort((a,b)=>b.score-a.score);
  const sel=state.matching.selectedIds;
  const must=scored.filter(b=>b.recommendation==="must-include");
  const good=scored.filter(b=>b.recommendation==="good-option");
  const drop=scored.filter(b=>b.recommendation==="drop");
  function bulletCard(b){
    const isSelected=sel.has(b.id);
    const clsMap={"must-include":"inclusion-must","good-option":"inclusion-good","drop":"inclusion-drop"};
    const badgeMap={"must-include":["badge-teal","Must include"],"good-option":["badge-amber","Good option"],"drop":["badge-gray","Consider dropping"]};
    const [badgeCls,badgeLbl]=badgeMap[b.recommendation]||["badge-gray","Score"];
    return`<div class="bullet-row ${isSelected?"selected":b.recommendation==="drop"?"dropped":""} ${clsMap[b.recommendation]||""}">
      <input type="checkbox" style="margin-top:2px;flex-shrink:0;accent-color:var(--teal)" data-select-bullet="${b.id}" ${isSelected?"checked":""}/>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
          <span style="font-size:11px;color:var(--gray)">${b.expTitle} &middot; ${b.company}</span>
          <span class="badge ${badgeCls}">${badgeLbl}</span>
          ${b.matchedKeywords.slice(0,2).map(k=>`<span class="badge badge-blue" style="font-size:10px">${k}</span>`).join("")}
        </div>
        <div class="bullet-text">${b.original}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <div class="score-bar" style="width:100px"><div class="score-fill" style="width:${Math.round(b.score*100)}%"></div></div>
          <span style="font-size:11px;color:var(--gray)">${Math.round(b.score*100)}% match</span>
        </div>
      </div>
    </div>`;
  }
  return`<div class="screen">
    <div class="screen-title">Match Studio</div>
    <div class="screen-sub">Bullets scored against your JD. Select which to include in your tailored resume.</div>
    <div class="card" style="padding:12px 16px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <span style="font-size:13px;font-weight:500">${sel.size} bullets selected</span>
        <button class="btn btn-secondary btn-sm" id="btn-select-must">Auto-select recommended</button>
        <button class="btn btn-secondary btn-sm" id="btn-clear-sel">Clear all</button>
        ${state.jd.keywords.length===0?`<span class="badge badge-amber"><i class="ti ti-alert-triangle" style="font-size:11px"></i> No JD loaded &mdash; showing priority scores</span>`:""}
      </div>
    </div>
    ${must.length>0?`<div style="font-size:12px;font-weight:600;color:var(--teal);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">Strongly recommended &middot; ${must.length}</div>${must.map(b=>bulletCard(b)).join("")}`:""}
    ${good.length>0?`<div style="font-size:12px;font-weight:600;color:var(--amber);margin:12px 0 8px;text-transform:uppercase;letter-spacing:0.5px">Good options &middot; ${good.length}</div>${good.map(b=>bulletCard(b)).join("")}`:""}
    ${drop.length>0?`<div style="font-size:12px;font-weight:600;color:var(--gray);margin:12px 0 8px;text-transform:uppercase;letter-spacing:0.5px">Consider dropping &middot; ${drop.length}</div>${drop.map(b=>bulletCard(b)).join("")}`:""}
    ${sel.size>0?`<div style="text-align:right;margin-top:16px"><button class="btn btn-primary" data-nav="rewrite-review" id="btn-go-rewrite"><i class="ti ti-arrow-right"></i> Review &amp; Rewrite (${sel.size} bullets)</button></div>`:""}
  </div>`;
}

function attachEvents(){
  document.querySelectorAll("[data-nav]").forEach(el=>{el.addEventListener("click",()=>{state.screen=el.dataset.nav;render();});});
  document.querySelectorAll("[data-tab]").forEach(el=>{el.addEventListener("click",()=>{state.cvTab=el.dataset.tab;render();});});
  document.querySelectorAll("[data-expand]").forEach(el=>{el.addEventListener("click",()=>{const id=el.dataset.expand;state.expandedExp=state.expandedExp===id?null:id;render();});});
  document.querySelectorAll("[data-profile]").forEach(el=>{el.addEventListener("input",e=>{state.cv.profile[el.dataset.profile]=e.target.value;});});
  document.querySelectorAll("[data-edit-bullet]").forEach(el=>{el.addEventListener("click",e=>{e.stopPropagation();const bid=el.dataset.editBullet;const eid=el.dataset.exp;const exp=state.cv.experience.find(e=>e.id===eid);const bullet=exp?.bullets.find(b=>b.id===bid);if(bullet)state.modal={type:"edit-bullet",bullet,expId:eid};render();});});
  document.querySelectorAll("[data-add-bullet]").forEach(el=>{el.addEventListener("click",e=>{e.stopPropagation();state.modal={type:"add-bullet",expId:el.dataset.addBullet};render();});});
  document.querySelectorAll("[data-del-bullet]").forEach(el=>{el.addEventListener("click",e=>{e.stopPropagation();const bid=el.dataset.delBullet;const eid=el.dataset.exp;const exp=state.cv.experience.find(e=>e.id===eid);if(exp)exp.bullets=exp.bullets.filter(b=>b.id!==bid);render();});});
  document.querySelectorAll("[data-select-bullet]").forEach(el=>{el.addEventListener("change",e=>{const bid=el.dataset.selectBullet;if(e.target.checked)state.matching.selectedIds.add(bid);else state.matching.selectedIds.delete(bid);render();});});
  document.querySelectorAll("[data-approve]").forEach(el=>{el.addEventListener("click",()=>{state.rewriteStatuses[el.dataset.approve]="approved";render();});});
  document.querySelectorAll("[data-reject]").forEach(el=>{el.addEventListener("click",()=>{state.rewriteStatuses[el.dataset.reject]="rejected";render();});});
  const analyzeBtn=document.getElementById("btn-analyze-jd");if(analyzeBtn)analyzeBtn.addEventListener("click",()=>{const text=document.getElementById("jd-input")?.value||"";if(text.length<30)return;state.jd={rawText:text,...extractKeywords(text)};render();});
  const selectMust=document.getElementById("btn-select-must");if(selectMust)selectMust.addEventListener("click",()=>{const allBullets=[];state.cv.experience.forEach(exp=>{exp.bullets.forEach(b=>{allBullets.push(b);})});const scored=allBullets.map(b=>scoreBullet(b,state.jd));scored.forEach(b=>{if(b.recommendation==="must-include"||b.recommendation==="good-option")state.matching.selectedIds.add(b.id);});render();});
  const clearSel=document.getElementById("btn-clear-sel");if(clearSel)clearSel.addEventListener("click",()=>{state.matching.selectedIds.clear();render();});
  const approveAll=document.getElementById("btn-approve-all");if(approveAll)approveAll.addEventListener("click",()=>{state.matching.selectedIds.forEach(id=>{state.rewriteStatuses[id]="approved";});render();});
  const saveBullet=document.getElementById("btn-save-bullet");if(saveBullet)saveBullet.addEventListener("click",()=>{const bid=saveBullet.dataset.bid;const eid=saveBullet.dataset.eid;const exp=state.cv.experience.find(e=>e.id===eid);if(!exp)return;const bullet=exp.bullets.find(b=>b.id===bid);if(!bullet)return;bullet.original=document.getElementById("modal-bullet-text")?.value||bullet.original;bullet.tags=document.getElementById("modal-bullet-tags")?.value.split(",").map(t=>t.trim()).filter(Boolean)||bullet.tags;const metrics=document.getElementById("modal-bullet-metrics")?.value.split(",").map(m=>m.trim()).filter(Boolean)||[];if(!bullet.facts)bullet.facts={};bullet.facts.metrics=metrics;state.modal=null;render();});
  const addBulletSave=document.getElementById("btn-add-bullet-save");if(addBulletSave)addBulletSave.addEventListener("click",()=>{const eid=addBulletSave.dataset.eid;const exp=state.cv.experience.find(e=>e.id===eid);if(!exp)return;const text=document.getElementById("modal-bullet-text")?.value||"";if(!text.trim())return;const tags=document.getElementById("modal-bullet-tags")?.value.split(",").map(t=>t.trim()).filter(Boolean)||[];const metrics=document.getElementById("modal-bullet-metrics")?.value.split(",").map(m=>m.trim()).filter(Boolean)||[];exp.bullets.push({id:"b"+Date.now(),original:text,facts:{metrics,tools:[],entities:[]},tags,competencies:[],targetRoles:["pm"],priority:0.7});state.modal=null;render();});
  const closeModal=document.getElementById("btn-close-modal");if(closeModal)closeModal.addEventListener("click",()=>{state.modal=null;render();});
  const overlay=document.getElementById("modal-overlay");if(overlay)overlay.addEventListener("click",e=>{if(e.target===overlay){state.modal=null;render();}});
  const printBtn=document.getElementById("btn-print");if(printBtn)printBtn.addEventListener("click",()=>{const preview=document.getElementById("export-preview");if(!preview)return;const w=window.open("","_blank");w.document.write(`<!DOCTYPE html><html><head><title>Resume - ${state.cv.profile.fullName}</title><style>body{font-family:Georgia,serif;max-width:680px;margin:40px auto;font-size:12px;line-height:1.7;color:#111}.export-name{font-size:20px;font-weight:700}.export-sh{text-transform:uppercase;font-size:10px;letter-spacing:1px;border-bottom:1px solid #ccc;margin:12px 0 6px;font-weight:700}.export-role{display:flex;justify-content:space-between}.export-bullet{margin-left:14px;margin-bottom:2px;position:relative}.export-bullet::before{content:"•";position:absolute;left:-10px}@media print{body{margin:20px}}</style></head><body>${preview.innerHTML}</body></html>`);w.document.close();w.focus();setTimeout(()=>w.print(),300);});
  const copyText=document.getElementById("btn-copy-text");if(copyText)copyText.addEventListener("click",()=>{const preview=document.getElementById("export-preview");if(!preview)return;navigator.clipboard.writeText(preview.innerText).then(()=>{copyText.innerHTML='<i class="ti ti-check"></i> Copied!';setTimeout(()=>{copyText.innerHTML='<i class="ti ti-copy"></i> Copy plain text';},2000);});});
  const saveJson=document.getElementById("btn-save-json");if(saveJson)saveJson.addEventListener("click",saveSession);
  const exportJsonBtn=document.getElementById("btn-export-json");if(exportJsonBtn)exportJsonBtn.addEventListener("click",saveSession);
  const importBtn=document.getElementById("btn-import-json");const importFile=document.getElementById("import-file");
  if(importBtn&&importFile){importBtn.addEventListener("click",()=>importFile.click());importFile.addEventListener("change",e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const data=JSON.parse(ev.target.result);if(data.cv)state.cv=data.cv;if(data.jd)state.jd=data.jd;if(data.rewrites)state.rewrites=data.rewrites;if(data.rewriteStatuses)state.rewriteStatuses=data.rewriteStatuses;if(data.matching?.selectedIds)state.matching.selectedIds=new Set(data.matching.selectedIds);render();}catch(err){alert("Invalid JSON file — make sure it was saved by RoleTailor Local.");}};reader.readAsText(file);});}
}

function saveSession(){
  const data={cv:state.cv,jd:state.jd,matching:{selectedIds:[...state.matching.selectedIds]},rewrites:state.rewrites,rewriteStatuses:state.rewriteStatuses,sessionId:state.sessionId,savedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="roletailor-session.json";a.click();URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
